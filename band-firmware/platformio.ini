; ============================================================
; platformio.ini — MotionMind Band Firmware
; Board: M5StickC PLUS2 (ESP32-PICO-V3-02)
; ============================================================

[env:m5stick-c-plus2]
platform  = espressif32
board     = m5stick-c
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Upload speed (stable on USB-C)
upload_speed = 921600

; Partition scheme — 8MB flash, enable BLE + OTA
board_build.partitions = default_8MB.csv

; ---- Libraries ---- ----------------------------------------
lib_deps =
    ; M5StickC PLUS2 board support + display + IMU
    m5stack/M5StickCPlus2 @ ^1.0.0

    ; BLE HID Keyboard (chegewara) — provides BleKeyboard.h
    ; Repo: https://github.com/T-vK/ESP32-BLE-Keyboard
    https://github.com/T-vK/ESP32-BLE-Keyboard.git

    ; ESP32 BLE Arduino (usually bundled with Espressif platform)
    ; No explicit dep needed; included via Arduino-ESP32 BLE stack

; ---- Build flags ---- --------------------------------------
build_flags =
    -DARDUINO_M5STICK_C_PLUS2
    ; Increase BLE stack size for dual-role (GATT + HID)
    -DCONFIG_BT_NIMBLE_ENABLED=1
    ; Enable verbose serial output in debug builds
    -DCORE_DEBUG_LEVEL=1

; ---- Upload / debug ---- ------------------------------------
; Uncomment to use JTAG debugging via OpenOCD
; debug_tool = esp-builtin
; debug_init_break = tbreak setup

[env:m5stick-c-plus2-release]
extends   = env:m5stick-c-plus2
build_type = release
build_flags =
    ${env:m5stick-c-plus2.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -Os
